<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <section class="bg-[#FEDCD2] p-[20px] h-[1100px]">
      <header
        class="flex items-center justify-between lg:py-[30px] max-w-[1100px] m-auto"
      >
        <div>
          <img src="./images/logo.png" alt="" />
        </div>
        <nav class="hidden lg:flex gap-[25px] text-[#424551] font-bold">
          <a href="">About Us</a>
          <a href="">Courses</a>
          <a href="">Courses</a>
          <a href="">Blog</a>
          <a href="">Contacts</a>
        </nav>
        <div class="flex gap-[15px]">
          <button
            class="hidden lg:block bg-[#F95614] text-white font-bold rounded-[4px] p-[15px]"
          >
            Get consultation
          </button>
          <div class="flex font-bold items-center gap-[5px]">
            <i class="fa-solid fa-user"></i>
            <p>Log in / Register</p>
          </div>
        </div>
      </header>
      <section class="max-w-[1100px] m-auto flex-col gap-[20px] flex lg:flex-row my-[40px] lg:my-[80px] lg:justify-between">
        <div class="flex flex-col gap-[35px] lg:w-[50%]">
          <div class="flex gap-[10px] items-center">
            <div class="w-[50px]">
              <img src="./images/hover.png" alt="" />
            </div>
            <p class="text-[14px] font-bold">Play showreel</p>
          </div>
          <p class="text-4xl font-bold lg:text-6xl">Enjoy studying with Createx Online Courses</p>
          <div class="flex gap-[10px] lg:gap-[20px]">
            <button class="text-[#FF3F3A] font-bold border border-[#F75E05] rounded-[3px] py-[12px] px-[30px]">About us</button>
            <button class="bg-[#F95711] text-white font-bold py-[13px] px-[30px] rounded-[4px]">Explore courses</button>
          </div>
        </div>
        <div>
            <img src="./images/illustration.png" alt="">
        </div>
      </section>
      <section class="flex flex-col gap-[20px] my-[70px] lg:flex-row max-w-[1100px] m-auto lg:my-[200px]">
        <div class="flex gap-[15px] items-center">
            <p class="text-[35px] font-bold">1200</p>
            <p>Students graduated</p>
            <div class="bg-[#F95416] h-[10px] w-[10px] rounded-[50%]"></div>
        </div>
        <div class="flex gap-[15px] items-center">
            <p class="text-[35px] font-bold">8400</p>
            <p>Completed courses</p>
            <div class="bg-[#F95416] h-[10px] w-[10px] rounded-[50%]"></div>
        </div>
        <div class="flex gap-[15px] items-center">
            <p class="text-[35px] font-bold">1600</p>
            <p>Qualified tutors</p>
            <div class="bg-[#F95416] h-[10px] w-[10px] rounded-[50%]"></div>
        </div>
        <div class="flex gap-[15px] items-center">
            <p class="text-[35px] font-bold">5000</p>
            <p>Years of experience</p>
            <div class="bg-[#F95416] h-[10px] w-[10px] rounded-[50%]"></div>
        </div>

      </section>
    </section>


  </body>
</html>
