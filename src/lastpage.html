<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./output.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

</head>
<body>

    <header
      class="flex items-center justify-between lg:py-[30px] max-w-[1100px] m-auto p-[20px]"
    >
      <div>
        <img src="./images/logo.png" alt="" />
      </div>
      <nav class="hidden lg:flex gap-[25px] text-[#424551] font-bold">
        <a href="">About Us</a>
        <a href="">Courses</a>
        <a href="">Courses</a>
        <a href="">Blog</a>
        <a href="">Contacts</a>
      </nav>
      <div class="flex gap-[15px]">
        <button
          class="hidden lg:block bg-[#F95614] text-white font-bold rounded-[4px] p-[15px] hover:border hover:border-[#FA511C] hover:text-[#FB4D23] hover:bg-white"
        >
          Get consultation
        </button>
        <div class="flex font-bold items-center gap-[5px]">
          <i class="fa-solid fa-user"></i>
          <p>Log in / Register</p>
        </div>
      </div>
    </header>

    <main>
        <section class="px-[20px] my-[50px] flex flex-col gap-[30px] lg:flex-row max-w-[1200px] m-auto ">
            <div class="flex flex-col gap-[30px] items-center">
               <div class="flex flex-col gap-[5px]">
                <p class="font-bold text-center">Contact info</p>
                <p class="text-2xl font-bold lg:text-5xl">Get in touch</p>
               </div>
               <div class=" flex flex-col gap-[20px]">
                <div class="flex gap-[10px] items-center">
                    <i class="fa-solid text-2xl text-[#F85B0B] fa-comments"></i>
                    <div>
                        <p class="text-[14px] text-[#787A80] font-bold">Talk to us:</p>
                        <p>hello@createx.com</p>
                    </div>
                </div>
                <div class="flex gap-[10px] items-center">
                    <i class="fa-solid text-2xl text-[#F85B0B] fa-mobile"></i>
                    <div>
                        <p class="text-[14px] text-[#787A80] font-bold">Call us:</p>
                        <p>(405) 555-0128</p>
                    </div>
                </div>
                <div class="flex gap-[10px] items-center">
                    <i class="fa-solid text-2xl text-[#F85B0B] fa-map-pin"></i>
                    <div>
                        <p class="text-[14px] text-[#787A80] font-bold">Address:</p>
                        <p>2464 Royal Ln. Mesa, <br> New Jersey 45463, USA</p>
                    </div>
                </div>

               </div>
               <div class="flex flex-col gap-[15px]">
                <p class="font-bold">Follow us:</p>
                <div>
                    <img src="./images/socialsp3.png" alt="">
                </div>
               </div>
            </div>
            <div>
                <img src="./images/mappin.png" alt="">
            </div>
        </section>
    </main>
    
</body>
</html>
